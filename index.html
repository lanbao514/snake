<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貪食蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
    }

    #scoreboard {
      width: min(400px, 90vw);
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      color: #4fc3f7;
      font-size: 16px;
      letter-spacing: 1px;
    }

    #canvas {
      display: block;
      width: min(400px, 90vw);
      height: min(400px, 90vw);
    }

    #dpad {
      display: none;
      margin-top: 24px;
      width: 160px;
      height: 160px;
      position: relative;
    }

    #dpad button {
      position: absolute;
      width: 52px;
      height: 52px;
      background: #1a2744;
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      color: #4fc3f7;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    #dpad button:active {
      background: #4fc3f7;
      color: #0a0e1a;
    }

    #btn-up    { top: 0;    left: 50%; transform: translateX(-50%); }
    #btn-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
    #btn-left  { left: 0;   top: 50%;  transform: translateY(-50%); }
    #btn-right { right: 0;  top: 50%;  transform: translateY(-50%); }

    #restart-btn {
      display: none;
      margin-top: 16px;
      padding: 10px 28px;
      background: #1a2744;
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      color: #4fc3f7;
      font-size: 16px;
      font-family: 'Courier New', Courier, monospace;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: none) and (pointer: coarse) {
      #dpad { display: block; }
      #restart-btn { display: block; }
    }
  </style>
</head>
<body>

  <div id="scoreboard">
    <span id="score">分數：0</span>
    <span id="highScore">最高：0</span>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>

  <div id="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-right">▶</button>
    <button id="btn-down">▼</button>
  </div>

  <button id="restart-btn">重新開始</button>

  <script>
    const COLS = 20;
    const ROWS = 20;
    const CELL = 20;
    const SPEED = 150;

    const COLORS = {
      bg: '#0a0e1a',
      grid: '#1a2744',
      snakeBody: '#4fc3f7',
      snakeHead: '#e1f5fe',
      food: '#ff5252'
    };

    const DIR = {
      ArrowUp:    { x: 0,  y: -1 },
      ArrowDown:  { x: 0,  y:  1 },
      ArrowLeft:  { x: -1, y:  0 },
      ArrowRight: { x: 1,  y:  0 }
    };

    const OPPOSITE = {
      ArrowUp:    'ArrowDown',
      ArrowDown:  'ArrowUp',
      ArrowLeft:  'ArrowRight',
      ArrowRight: 'ArrowLeft'
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const restartBtn = document.getElementById('restart-btn');

    let snake, food, direction, nextDirection, score, highScore, gameLoop, isGameOver;

    function initState() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 }
      ];
      direction = 'ArrowRight';
      nextDirection = 'ArrowRight';
      score = 0;
      isGameOver = false;
      highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
      scoreEl.textContent = '分數：0';
      highScoreEl.textContent = '最高：' + highScore;
      restartBtn.style.display = 'none';
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function draw() {
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(canvas.width, r * CELL);
        ctx.stroke();
      }

      ctx.fillStyle = COLORS.food;
      ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

      ctx.fillStyle = COLORS.snakeBody;
      for (let i = 1; i < snake.length; i++) {
        ctx.fillRect(snake[i].x * CELL + 1, snake[i].y * CELL + 1, CELL - 2, CELL - 2);
      }

      ctx.fillStyle = COLORS.snakeHead;
      ctx.fillRect(snake[0].x * CELL + 1, snake[0].y * CELL + 1, CELL - 2, CELL - 2);
    }

    function update() {
      direction = nextDirection;

      const head = snake[0];
      const d = DIR[direction];
      const newHead = { x: head.x + d.x, y: head.y + d.y };

      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        endGame();
        return;
      }

      if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        scoreEl.textContent = '分數：' + score;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore);
          highScoreEl.textContent = '最高：' + highScore;
        }
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      isGameOver = true;
      clearInterval(gameLoop);
      draw();
      drawGameOver();
      restartBtn.style.display = 'block';
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      ctx.fillStyle = '#e1f5fe';
      ctx.font = 'bold 36px "Courier New", Courier, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GAME OVER', cx, cy - 40);

      ctx.fillStyle = '#4fc3f7';
      ctx.font = '20px "Courier New", Courier, monospace';
      ctx.fillText('分數：' + score, cx, cy + 10);

      ctx.fillStyle = '#b3e5fc';
      ctx.font = '16px "Courier New", Courier, monospace';
      ctx.fillText('按空白鍵重新開始', cx, cy + 50);
    }

    function startGame() {
      if (gameLoop) clearInterval(gameLoop);
      initState();
      spawnFood();
      draw();
      gameLoop = setInterval(update, SPEED);
    }

    function handleDir(code) {
      if (DIR[code] && code !== OPPOSITE[direction]) {
        nextDirection = code;
      }
    }

    // 鍵盤
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') {
        if (isGameOver) startGame();
        return;
      }
      if (DIR[e.code]) {
        e.preventDefault();
        handleDir(e.code);
      }
    });

    // D-pad 按鈕
    document.getElementById('btn-up').addEventListener('touchstart',    function(e) { e.preventDefault(); handleDir('ArrowUp'); },    { passive: false });
    document.getElementById('btn-down').addEventListener('touchstart',  function(e) { e.preventDefault(); handleDir('ArrowDown'); },  { passive: false });
    document.getElementById('btn-left').addEventListener('touchstart',  function(e) { e.preventDefault(); handleDir('ArrowLeft'); },  { passive: false });
    document.getElementById('btn-right').addEventListener('touchstart', function(e) { e.preventDefault(); handleDir('ArrowRight'); }, { passive: false });

    // 手機重新開始按鈕
    restartBtn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (isGameOver) startGame();
    }, { passive: false });

    startGame();
  </script>
</body>
</html>
