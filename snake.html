<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貪食蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }

    #scoreboard {
      width: 400px;
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      color: #4fc3f7;
      font-size: 16px;
      letter-spacing: 1px;
    }

    #canvas {
      display: block;
    }
  </style>
</head>
<body>

  <div id="scoreboard">
    <span id="score">分數：0</span>
    <span id="highScore">最高：0</span>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>

  <script>
    // 1. 常數
    const COLS = 20;
    const ROWS = 20;
    const CELL = 20;
    const SPEED = 150;

    const COLORS = {
      bg: '#0a0e1a',
      grid: '#1a2744',
      snakeBody: '#4fc3f7',
      snakeHead: '#e1f5fe',
      food: '#ff5252'
    };

    const DIR = {
      ArrowUp:    { x: 0,  y: -1 },
      ArrowDown:  { x: 0,  y:  1 },
      ArrowLeft:  { x: -1, y:  0 },
      ArrowRight: { x: 1,  y:  0 }
    };

    const OPPOSITE = {
      ArrowUp:    'ArrowDown',
      ArrowDown:  'ArrowUp',
      ArrowLeft:  'ArrowRight',
      ArrowRight: 'ArrowLeft'
    };

    // 2. DOM 變數
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');

    // 3. 狀態變數
    let snake, food, direction, nextDirection, score, highScore, gameLoop, isGameOver;

    // 4. 函式

    function initState() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 }
      ];
      direction = 'ArrowRight';
      nextDirection = 'ArrowRight';
      score = 0;
      isGameOver = false;
      highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
      scoreEl.textContent = '分數：0';
      highScoreEl.textContent = '最高：' + highScore;
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function draw() {
      // 背景
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 格線
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(canvas.width, r * CELL);
        ctx.stroke();
      }

      // 食物
      ctx.fillStyle = COLORS.food;
      ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

      // 蛇身（index 1 以後）
      ctx.fillStyle = COLORS.snakeBody;
      for (let i = 1; i < snake.length; i++) {
        ctx.fillRect(snake[i].x * CELL + 1, snake[i].y * CELL + 1, CELL - 2, CELL - 2);
      }

      // 蛇頭（index 0）
      ctx.fillStyle = COLORS.snakeHead;
      ctx.fillRect(snake[0].x * CELL + 1, snake[0].y * CELL + 1, CELL - 2, CELL - 2);
    }

    function update() {
      direction = nextDirection;

      const head = snake[0];
      const d = DIR[direction];
      const newHead = { x: head.x + d.x, y: head.y + d.y };

      // 撞牆
      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        endGame();
        return;
      }

      // 撞自己
      if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      // 吃到食物
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        scoreEl.textContent = '分數：' + score;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore);
          highScoreEl.textContent = '最高：' + highScore;
        }
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      isGameOver = true;
      clearInterval(gameLoop);
      draw();
      drawGameOver();
    }

    function drawGameOver() {
      // 半透明遮罩
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      // GAME OVER
      ctx.fillStyle = '#e1f5fe';
      ctx.font = 'bold 36px "Courier New", Courier, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GAME OVER', cx, cy - 40);

      // 分數
      ctx.fillStyle = '#4fc3f7';
      ctx.font = '20px "Courier New", Courier, monospace';
      ctx.fillText('分數：' + score, cx, cy + 10);

      // 提示
      ctx.fillStyle = '#b3e5fc';
      ctx.font = '16px "Courier New", Courier, monospace';
      ctx.fillText('按空白鍵重新開始', cx, cy + 50);
    }

    function startGame() {
      if (gameLoop) clearInterval(gameLoop);
      initState();
      spawnFood();
      draw();
      gameLoop = setInterval(update, SPEED);
    }

    // 鍵盤控制
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') {
        if (isGameOver) {
          startGame();
        }
        return;
      }

      if (DIR[e.code]) {
        e.preventDefault();
        // 禁止 180 度反向
        if (e.code !== OPPOSITE[direction]) {
          nextDirection = e.code;
        }
      }
    });

    // 5. 啟動
    startGame();
  </script>
</body>
</html>
